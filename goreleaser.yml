version: 2
project_name: tc

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: tc
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: user
      name: homebrew-tc
    homepage: "https://github.com/user/tc"
    description: "ToolCraft — 程序员的文本/数据瑞士军刀"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
